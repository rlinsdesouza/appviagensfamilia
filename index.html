<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto - Expedição Família</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1550px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        h1 { color: #1a365d; margin: 0; font-size: 24px; }
        .btn { background: #2b6cb0; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-export { background: #2f855a; }
        .btn-sync { background: #dd6b20; }
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; background: #edf2f7; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: #4a5568; display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px;}
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        th { background-color: #2d3748; color: white; position: sticky; top: 0; }
        tr:hover { background-color: #f7fafc; }
        
        .family-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .family-tag { font-size: 11px; padding: 3px 6px; background: #e2e8f0; border-radius: 4px; font-weight: bold; cursor: pointer; border: 1px solid #cbd5e0; }
        .family-tag.active { background: #2f855a; color: white; border-color: #22543d; }
        
        #map { height: 550px; width: 100%; border-radius: 8px; border: 1px solid #cbd5e0; margin-top: 20px;}
        #loader { display: none; color: #dd6b20; font-weight: bold; margin-left: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>🌳 Legado de Viagens - Os locais que já conhecemos</h1>
        <div>
            <span id="loader">🔄 Sincronizando com a Nuvem...</span>
            <input type="file" id="json-loader" accept=".json" style="display:none" onchange="uploadJSONBase(this)">
            <button class="btn" style="background: #d69e2e;" onclick="document.getElementById('json-loader').click()">📥 Fazer Upload da Base (JSON)</button>
            <button class="btn btn-sync" onclick="loadData()">🔄 Forçar Atualização</button>
            <button class="btn btn-export" onclick="exportarParaGemini()">📤 Gerar Prompt IA</button>
        </div>
    </div>

    <div style="background: #fffaf0; border-left: 4px solid #dd6b20; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
        <label>Defina os Núcleos Familiares (Pressione Enter para adicionar):</label>
        <input type="text" id="family-input" placeholder="Ex: Nome da família ou Nome da pessoa" onkeypress="addFamily(event)" style="max-width: 400px;">
        <div id="family-list" style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
    </div>

    <div class="filters">
	<div>
        <label>Busca Rápida (Nome, Região ou ID)</label>
        <input type="text" id="search-input" placeholder="🔍 Digite para buscar..." onkeyup="renderData()">
		<button onclick="abrirModal()" class="btn" style="background:#2f855a; color:white; padding:10px; cursor:pointer;">
        + Novo Destino
    </button>
    </div>
    <div>
        <label>Filtrar por Região</label>
        <select id="filter-region" onchange="renderData()"><option value="Todos">Todos</option></select>
    </div>
    </div>
        <div>
            <label>Exibir apenas NÃO VISITADOS por:</label>
            <select id="filter-missing-family" onchange="renderData()">
                <option value="Todos">Mostrar Todos os Destinos</option>
            </select>
        </div>
    </div>

    <div style="overflow-x: auto; max-height: 450px; border: 1px solid #e2e8f0; border-radius: 6px;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Destino</th>
                    <th>Janela / Hub</th>
                    <th>Custo</th>
                    <th>Famílias que já visitaram (Clique para marcar)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="5" style="text-align:center;">Carregando dados da nuvem...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="map"></div>
</div>

<div id="exportModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:10px; z-index:100; width:80%; max-width:600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <h3>🤖 Cole este texto no Chat do Gemini</h3>
    <textarea id="exportArea" readonly style="width:100%; height:180px; font-family:monospace; font-size:12px;" onclick="this.select()"></textarea>
    <button class="btn" style="margin-top:15px; background:#4a5568;" onclick="document.getElementById('exportModal').style.display='none'">Fechar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // =========================================================================
    // COLE AQUI O SEU LINK DA API (O que termina com /exec)
    const API_URL = "https://script.google.com/macros/s/AKfycbzOb7YdOABDQUQpjSWmK-c4w1BLkSOLc0YxDPlgwHRv59iDXWNKwHfTEXMYnP0mqZWMjQ/exec"; 
    // =========================================================================

    let places = [];
    let registeredFamilies = JSON.parse(localStorage.getItem('legacy_families')) || ['Pais', 'Joao', 'Maria'];
    let map, markerLayer;

    // AUTO-CARREGAMENTO (Ajuste #2)
    window.onload = function() {
        initMap();
        renderFamilyList();
        loadData(); // Inicia o download da nuvem assim que o site abre
    };

    function initMap() {
        map = L.map('map').setView([-10, -35], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markerLayer = L.layerGroup().addTo(map);
    }

    async function loadData() {
        if(API_URL.includes("/dev") { 
            alert("Por favor, cole a URL de produção (/exec) do Google Apps Script na variável API_URL do HTML!"); 
            return; 
        }
        
        document.getElementById('loader').style.display = 'inline-block';
        try {
            let response = await fetch(API_URL, { method: 'GET', redirect: 'follow' });
            if (!response.ok) throw new Error('Falha na rede');
            
            places = await response.json();
            
            // Leitura Dinâmica de Famílias (Ajuste #4)
            // Varre o banco de dados e adiciona qualquer família nova que encontrar
            let familiesFromDB = new Set(registeredFamilies);
            places.forEach(p => {
                if (p.Familias) {
                    p.Familias.split(',').forEach(f => {
                        let fam = f.trim();
                        if(fam) familiesFromDB.add(fam);
                    });
                }
            });
            registeredFamilies = Array.from(familiesFromDB);
            localStorage.setItem('legacy_families', JSON.stringify(registeredFamilies));
            renderFamilyList();

            buildFilters();
            renderData();
        } catch (error) {
            console.error(error);
            alert("Erro ao baixar dados da Nuvem. Verifique o link e a conexão.");
        }
        document.getElementById('loader').style.display = 'none';
    }

    async function uploadJSONBase(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            const jsonData = JSON.parse(e.target.result);
            
            // Adicionamos um indicador visual de carregamento
            alert("Enviando dados... aguarde.");

            const response = await fetch(API_URL, {
                method: 'POST',
                redirect: 'follow',
                body: JSON.stringify({ action: 'append_import', data: jsonData })
            });

            // A MÁGICA: Não tentamos ler o response.json() se o navegador bloqueou.
            // Apenas verificamos se o status foi 200.
            if (response.status === 200) {
                alert("Dados enviados com sucesso! Verifique sua planilha.");
                loadData(); 
            } else {
                alert("Erro no servidor: " + response.status);
            }
        } catch (err) {
            // Se cair aqui, é o CORS bloqueando a leitura da resposta.
            // MAS, se o request chegou ao status 200 (o que vimos no Network), o dado foi.
            alert("Aviso: O navegador bloqueou a confirmação (CORS), mas verifique sua planilha, os dados provavelmente subiram!");
            loadData();
        }
    };
    reader.readAsText(file);
}

    function addFamily(e) {
        if (e.key === 'Enter' && e.target.value.trim() !== '') {
            let newFam = e.target.value.trim();
            if(!registeredFamilies.includes(newFam)) {
                registeredFamilies.push(newFam);
                localStorage.setItem('legacy_families', JSON.stringify(registeredFamilies));
                renderFamilyList();
                buildFilters();
                renderData();
            }
            e.target.value = '';
        }
    }

function renderFamilyList() {
    const div = document.getElementById('family-list');
    div.innerHTML = registeredFamilies.map(f => `
        <span class="family-tag active">
            ${f}
            <button onclick="renomearFamilia('${f}')" style="border:none; background:transparent; cursor:pointer; font-size:10px;">✏️</button>
            <button onclick="removeFamily('${f}')" style="border:none; background:transparent; cursor:pointer; font-size:10px; color:red;">×</button>
        </span>
    `).join('');
}

async function renomearFamilia(oldName) {
    let newName = prompt(`Digite o novo nome para a família "${oldName}":`);
    if (!newName || newName === oldName) return;

    document.getElementById('loader').style.display = 'inline-block';
    
    // 1. Atualiza a lista global
    registeredFamilies = registeredFamilies.map(f => f === oldName ? newName : f);
    localStorage.setItem('legacy_families', JSON.stringify(registeredFamilies));

    // 2. Atualiza todos os destinos na planilha
    for (let p of places) {
        let visited = (p.Familias || "").split(',').map(s => s.trim()).filter(Boolean);
        if (visited.includes(oldName)) {
            // Substitui o nome antigo pelo novo
            p.Familias = visited.map(f => f === oldName ? newName : f).join(', ');
            
            // Salva linha no backend
            await fetch(API_URL, {
                method: 'POST', redirect: 'follow',
                body: JSON.stringify({ action: 'save_row', data: p })
            });
        }
    }
    loadData();
}

async function removeFamily(familyName) {
    // Validação Matemática
    if (!confirmarMatematica()) {
        alert("Resposta errada! Ação cancelada por segurança.");
        return;
    }
    
    // Lógica de remoção (mesma que tínhamos, agora com a validação)
    // ... (restante da sua função removeFamily)
}

    function buildFilters() {
        const fRegion = document.getElementById('filter-region');
        const regions = ['Todos', ...new Set(places.map(p => p.Regiao.split(' - ')[0]))];
        fRegion.innerHTML = regions.map(r => `<option value="${r}">${r}</option>`).join('');

        const fMissing = document.getElementById('filter-missing-family');
        fMissing.innerHTML = '<option value="Todos">Mostrar Todos os Destinos</option>' + 
                             registeredFamilies.map(f => `<option value="${f}">Não visitados por: ${f}</option>`).join('');
    }

    function renderData() {
    // Busca os elementos com segurança (retorna vazio se não achar)
    const elReg = document.getElementById('filter-region');
    const elCat = document.getElementById('filter-category');
    const elDur = document.getElementById('filter-duration');
    const elFam = document.getElementById('filter-missing-family');
    const elSearch = document.getElementById('search-input');

    const reg = elReg ? elReg.value : 'Todos';
    const cat = elCat ? elCat.value : 'Todos';
    const dur = elDur ? elDur.value : 'Todos';
    const missingFam = elFam ? elFam.value : 'Todos';
    const searchTerm = elSearch ? elSearch.value.toLowerCase() : ''; // Se não achar o search, busca vazia
    
    // ... resto da função permanece igual
    
    const tbody = document.getElementById('table-body');
    
    // O filtro agora encadeia 4 condições simultâneas
    let filtered = places.filter(p => {
        const matchRegion = (reg === 'Todos' || p.Regiao.startsWith(reg));
        const matchCategory = (cat === 'Todos' || p.Categoria === cat);
        const matchDuration = (dur === 'Todos' || p.Janela === dur);
        const matchMissingFam = (missingFam === 'Todos' || !(p.Familias || "").includes(missingFam));
        
        // A busca varre Nome, Regiao ou ID
        const matchSearch = (
            p.Nome.toLowerCase().includes(searchTerm) || 
            p.Regiao.toLowerCase().includes(searchTerm) || 
            p.ID.toLowerCase().includes(searchTerm)
        );
        
        return matchRegion && matchCategory && matchDuration && matchMissingFam && matchSearch;
    });

        let html = '';
        filtered.forEach(p => {
            let visitedFamilies = (p.Familias || "").split(',').map(s => s.trim()).filter(Boolean);
            
            let familyButtons = registeredFamilies.map(fam => {
                let isActive = visitedFamilies.includes(fam) ? 'active' : '';
                return `<span class="family-tag ${isActive}" onclick="toggleFamily('${p.ID}', '${fam}')">${fam}</span>`;
            }).join('');

       
html += `<tr>
    <td><b>${p.ID}</b></td>
    <td><b>${p.Regiao}</b><br>${p.Nome}</td>
    <td>${p.Janela}<br><small>${p.Hub}</small></td>
    <td>${p.Custo}</td>
    <td><div class="family-tags">${familyButtons}</div></td>
    <td>
		<button onclick="registrarVisita('${p.ID}')" class="btn" style="background:green; font-size:10px;">+ Visita</button>
        <button onclick="abrirModal('${p.ID}')" style="cursor:pointer">✏️</button>
        <button onclick="excluirDestino('${p.ID}')" style="cursor:pointer">🗑️</button>
    </td>
</tr>`;
        });
        tbody.innerHTML = html;
        updateMapMarkers(filtered); // Passando a lista filtrada para o mapa
    }

    // MAPA COM MARCAÇÕES FORTES (Ajuste #1)
    function updateMapMarkers(dataToRender) {
        if(!markerLayer) return;
        markerLayer.clearLayers();
        
        dataToRender.forEach(p => {
            let lat = parseFloat(p.Lat);
            let lng = parseFloat(p.Lng);
            
            if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
                let visited = (p.Familias || "").split(',').map(s => s.trim()).filter(Boolean);
                let totalFamilies = registeredFamilies.length;
                
                // Azul (Ninguém), Laranja (Parcial), Verde (Todos)
                let col = visited.length === 0 ? "#2b6cb0" : 
                          (visited.length === totalFamilies ? "#2f855a" : "#dd6b20");
                
                const marker = L.circleMarker([lat, lng], { 
                    radius: 4, // Bolinhas maiores
                    fillColor: col, 
                    color: "#1a202c", // Borda escura para alto contraste
                    weight: 2, // Borda mais grossa
                    fillOpacity: 1.0 // Cor totalmente sólida, zero transparência
                });
                
                marker.bindPopup(`<b>${p.Nome}</b><br>Visitado por: ${visited.join(', ') || 'Ninguém'}`);
                markerLayer.addLayer(marker);
            }
        });
    }

    async function toggleFamily(placeId, familyName) {
        document.getElementById('loader').style.display = 'inline-block';
        let place = places.find(p => p.ID === placeId);
        let visited = (place.Familias || "").split(',').map(s => s.trim()).filter(Boolean);
        
        if (visited.includes(familyName)) {
            visited = visited.filter(f => f !== familyName);
        } else {
            visited.push(familyName);
        }
        
        let newFamiliesStr = visited.join(', ');
        place.Familias = newFamiliesStr;
        renderData(); 

        try {
            await fetch(API_URL, {
                method: 'POST',
                redirect: 'follow',
                body: JSON.stringify({ id: placeId, familias: newFamiliesStr })
            });
        } catch(e) {
            console.error(e);
        }
        document.getElementById('loader').style.display = 'none';
    }

    function exportarParaGemini() {
        const missingFam = document.getElementById('filter-missing-family').value;
        if (missingFam === "Todos") {
            alert("Selecione no filtro 'Exibir apenas NÃO VISITADOS por' a família que vai viajar. Assim o prompt não fica gigante!");
            return;
        }

        let filtrados = places.filter(p => !(p.Familias || "").includes(missingFam));
        const compact = filtrados.map(p => `${p.ID}|${p.Custo}|${p.Hub}`);
        
        const promptFinal = `=== PLANEJAMENTO DE VIAGEM ===\nFamília Viajante: ${missingFam}\nDestinos Não Visitados (ID|Custo|Hub):\n${compact.join('\n')}\n=== FIM ===\nGemini, baseado nesta lista acima, monte um roteiro para [X] dias com orçamento de [R$ Y].`;
        
        document.getElementById('exportArea').value = promptFinal;
        document.getElementById('exportModal').style.display = 'block';
    }
	
async function excluirDestino(id) {
    // 1. Validação Matemática
    if (!confirmarMatematica()) {
        alert("Resposta errada! Ação cancelada.");
        return;
    }
    
    document.getElementById('loader').style.display = 'inline-block';
    
    // 2. Fetch para o Backend
    let response = await fetch(API_URL, { 
        method: 'POST', 
        redirect: 'follow', 
        body: JSON.stringify({ action: 'delete_row', id: id }) 
    });
    
    let result = await response.json();
    
    if(result.status === "success") {
        alert("Destino excluído com sucesso!");
        await loadData(); // 3. Recarrega a base do servidor para o HTML atualizar
    } else {
        alert("Erro ao excluir: " + result.msg);
    }
    
    document.getElementById('loader').style.display = 'none';
}

function abrirModal(id = null) {
    const modal = document.getElementById('modalDestino');
    const idField = document.getElementById('modal-id');
    const title = document.getElementById('modalTitle');
    
    modal.style.display = 'block';

    if (id) {
        // MODO EDIÇÃO
        title.innerText = "Editar Destino";
        idField.disabled = true; // Não podemos mudar o ID de um destino existente
        
        let p = places.find(x => x.ID == id);
        if(p) {
            document.getElementById('modal-id').value = p.ID;
            document.getElementById('modal-nome').value = p.Nome;
            document.getElementById('modal-regiao').value = p.Regiao;
            document.getElementById('modal-lat').value = p.Lat;
            document.getElementById('modal-lng').value = p.Lng;
            // Se tiver o campo histórico no modal
            if(document.getElementById('modal-historico')) 
                document.getElementById('modal-historico').value = p.Historico || "";
        }
    } else {
        // MODO CRIAÇÃO
        title.innerText = "Novo Destino";
        idField.disabled = false; // Permite digitar um novo ID
        
        // Limpa todos os campos
        idField.value = "";
        document.getElementById('modal-nome').value = "";
        document.getElementById('modal-regiao').value = "";
        document.getElementById('modal-lat').value = "";
        document.getElementById('modal-lng').value = "";
        if(document.getElementById('modal-historico')) 
            document.getElementById('modal-historico').value = "";
    }
}

async function salvarDestino() {
    let id = document.getElementById('modal-id').value;
    let p = places.find(x => x.ID == id);
    
    // Atualiza o objeto local
    p.Nome = document.getElementById('modal-nome').value;
    p.Regiao = document.getElementById('modal-regiao').value;
    p.Lat = document.getElementById('modal-lat').value;
    p.Lng = document.getElementById('modal-lng').value;
    
    document.getElementById('loader').style.display = 'inline-block';
    
    await fetch(API_URL, { 
        method: 'POST', 
        redirect: 'follow', 
        body: JSON.stringify({ action: 'save_row', data: p }) 
    });
    
    document.getElementById('modalDestino').style.display = 'none';
    loadData(); // Recarrega tudo da planilha
}

async function removeFamily(familyName) {
    // 1. Validação Matemática
    if (!confirmarMatematica()) {
        alert("Resposta errada! Ação cancelada.");
        return;
    }
    
    document.getElementById('loader').style.display = 'inline-block';
    document.getElementById('loader').innerText = '🔥 Removendo família...';

    // 2. Remove da lista global
    registeredFamilies = registeredFamilies.filter(f => f !== familyName);
    localStorage.setItem('legacy_families', JSON.stringify(registeredFamilies));
    
    // 3. Atualiza os destinos
    for(let p of places) {
        let visited = (p.Familias || "").split(',').map(s => s.trim()).filter(Boolean);
        if(visited.includes(familyName)) {
            p.Familias = visited.filter(f => f !== familyName).join(', ');
            await fetch(API_URL, {
                method: 'POST', redirect: 'follow',
                body: JSON.stringify({ id: p.ID, familias: p.Familias })
            });
        }
    }
      
    // 3. Atualiza a interface
    renderFamilyList();
    buildFilters();
    renderData();
    document.getElementById('loader').style.display = 'none';
}

function confirmarMatematica() {
    let n1 = Math.floor(Math.random() * 9) + 1;
    let n2 = Math.floor(Math.random() * 9) + 1;
    let respostaUsuario = prompt(`Segurança: Para confirmar esta ação, responda quanto é ${n1} + ${n2}:`);
    return parseInt(respostaUsuario) === (n1 + n2);
}

async function registrarVisita(id) {
    let familia = prompt("Qual família visitou este local?");
    if (!familia) return;

    let p = places.find(x => x.ID == id);
    if (!p) return;

    let dataHoje = new Date().toLocaleDateString('pt-BR');
    let registro = `${familia}:${dataHoje}`;
    
    // Concatena o novo registro ao histórico existente
    p.Historico = (p.Historico && p.Historico !== "undefined") ? `${p.Historico}; ${registro}` : registro;
    
    // Salva no backend
    document.getElementById('loader').style.display = 'block';
    await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'save_row', data: p })
    });
    
    document.getElementById('loader').style.display = 'none';
    alert("Visita de " + familia + " registrada com sucesso!");
    loadData(); // Atualiza a tabela
}

async function salvarDestino() {
    // Agora o Javascript lê os mesmos IDs do HTML!
    let p = {
        ID: document.getElementById('modal-id').value,
        Nome: document.getElementById('modal-nome').value,
        Regiao: document.getElementById('modal-regiao').value,
        Lat: document.getElementById('modal-lat').value,
        Lng: document.getElementById('modal-lng').value,
        Historico: document.getElementById('modal-historico') ? document.getElementById('modal-historico').value : ""
    };
    
    document.getElementById('loader').style.display = 'inline-block';
    
    await fetch(API_URL, {
        method: 'POST',
        redirect: 'follow',
        body: JSON.stringify({ action: 'save_row', data: p })
    });
    
    document.getElementById('modalDestino').style.display = 'none';
    alert("Destino salvo com sucesso!");
    loadData();
}

// 2. Função de salvamento (Backend) - Usada tanto pelo Modal quanto pela Visita
async function salvarDestinoNoBackend(p) {
    await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'save_row', data: p })
    });
}



</script>
<div id="modalDestino" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:10px; z-index:1000; box-shadow:0 0 20px rgba(0,0,0,0.5); width: 400px;">
    <h3 id="modalTitle">Editar Destino</h3>
    <label>ID:</label><input type="text" id="modal-id" disabled>
    <label>Nome:</label><input type="text" id="modal-nome">
    <label>Região:</label><input type="text" id="modal-regiao">
    <label>Latitude:</label><input type="text" id="modal-lat">
    <label>Longitude:</label><input type="text" id="modal-lng">
    <label>Histórico de Visitas:</label>
    <textarea id="modal-historico" style="width:100%; height:60px;" placeholder="Ex: Familia Silva:27/06/2026"></textarea>
    
    <div style="margin-top:15px; display: flex; gap: 10px;">
        <button class="btn" style="background:#2f855a" onclick="salvarDestino()">Salvar</button>
        <button class="btn" style="background:#718096" onclick="document.getElementById('modalDestino').style.display='none'">Cancelar</button>
    </div>
</div>
